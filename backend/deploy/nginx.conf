# /etc/nginx/sites-available/cloudhisaab-api
# Symlink: sudo ln -s /etc/nginx/sites-available/cloudhisaab-api /etc/nginx/sites-enabled/

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    server_name api.cloudhisab.in;
    return 301 https://$host$request_uri;
}

# ── HTTPS ──
server {
    listen 443 ssl http2;
    server_name api.cloudhisab.in;

    # Certbot fills these in automatically
    ssl_certificate     /etc/letsencrypt/live/api.cloudhisab.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cloudhisab.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # GraphQL endpoint
    location /graphql {
        proxy_pass         http://127.0.0.1:8000/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS headers (belt-and-suspenders — app also sets these)
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check
    location /health {
        proxy_pass       http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # Root info
    location / {
        proxy_pass       http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}
